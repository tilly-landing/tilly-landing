<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilly Admin — Booking Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0A0A0A;
            --off-white: #FAF9F6;
            --pure-white: #FFFFFF;
            --neon: #C8F560;
            --neon-dark: #A8D440;
            --gray-100: #F5F5F5;
            --gray-200: #E5E5E5;
            --gray-400: #A3A3A3;
            --gray-600: #525252;
            --success: #22C55E;
            --warning: #F59E0B;
            --danger: #EF4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--off-white);
            color: var(--black);
            line-height: 1.6;
        }
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--black);
        }
        .login-box {
            background: var(--pure-white);
            padding: 48px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .login-box p { color: var(--gray-400); margin-bottom: 32px; }
        .login-box input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
        }
        .login-box input:focus {
            border-color: var(--neon-dark);
            box-shadow: 0 0 0 4px rgba(200, 245, 96, 0.15);
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: var(--black);
            color: var(--pure-white);
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        
        .header {
            background: var(--black);
            color: var(--pure-white);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .header .logo-mark {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--neon);
            color: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            padding: 24px 5%;
            background: var(--pure-white);
            border-bottom: 1px solid var(--gray-200);
        }
        .stat-card {
            background: var(--gray-100);
            padding: 20px;
            border-radius: 12px;
        }
        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--black);
        }
        .stat-card .label {
            font-size: 0.85rem;
            color: var(--gray-400);
        }
        .filters {
            padding: 20px 5%;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 20px;
            border-radius: 100px;
            border: 1.5px solid var(--gray-200);
            background: var(--pure-white);
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn.active {
            background: var(--black);
            color: var(--pure-white);
            border-color: var(--black);
        }
        .bookings-list {
            padding: 0 5% 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .booking-card {
            background: var(--pure-white);
            border: 1px solid var(--gray-200);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }
        .booking-card:hover {
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .booking-ref {
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray-600);
            background: var(--gray-100);
            padding: 4px 12px;
            border-radius: 6px;
        }
        .status-badge {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-pending { background: #FEF3C7; color: #92400E; }
        .status-confirmed { background: #D1FAE5; color: #065F46; }
        .status-completed { background: #DBEAFE; color: #1E40AF; }
        .status-cancelled { background: #FEE2E2; color: #991B1B; }
        
        .booking-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .detail {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .detail-label {
            font-size: 0.75rem;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .detail-value {
            font-size: 0.95rem;
            font-weight: 600;
        }
        .booking-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding-top: 16px;
            border-top: 1px solid var(--gray-200);
        }
        .action-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .btn-confirm {
            background: var(--success);
            color: white;
        }
        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }
        .btn-cancel {
            background: var(--danger);
            color: white;
        }
        .btn-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }
        .btn-whatsapp {
            background: #25D366;
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--gray-400);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-400);
        }
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 12px; text-align: center; }
            .booking-header { flex-direction: column; gap: 12px; }
            .booking-actions { flex-direction: column; }
            .action-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>🧼 Tilly Admin</h1>
            <p>Enter your admin secret to access bookings</p>
            <input type="password" id="adminSecret" placeholder="Admin secret key" onkeypress="if(event.key==='Enter')login()">
            <button onclick="login()">Access Dashboard</button>
            <p id="loginError" style="color: var(--danger); margin-top: 16px; display: none;">Invalid secret key</p>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="header">
            <h1><div class="logo-mark">T</div> Tilly Booking Dashboard</h1>
            <div style="font-size: 0.9rem; color: var(--gray-400);">Amman, Jordan</div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="value" id="statTotal">0</div>
                <div class="label">Total Bookings</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statPending">0</div>
                <div class="label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statConfirmed">0</div>
                <div class="label">Confirmed</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statRevenue">0</div>
                <div class="label">Revenue (JOD)</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterBookings('all')">All</button>
            <button class="filter-btn" onclick="filterBookings('PENDING')">Pending</button>
            <button class="filter-btn" onclick="filterBookings('CONFIRMED')">Confirmed</button>
            <button class="filter-btn" onclick="filterBookings('COMPLETED')">Completed</button>
            <button class="filter-btn" onclick="filterBookings('CANCELLED')">Cancelled</button>
        </div>

        <div class="bookings-list" id="bookingsList">
            <div class="loading">Loading bookings...</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbw-3Sfy18k0XBhsDczoMH8KxHMUVpjfnJeiSbnhWqqK0rgpETM0EMJRYntzO-BxIR7Q/exec';
        
        let adminSecret = localStorage.getItem('tilly_admin_secret');
        let allBookings = [];
        let currentFilter = 'all';

        // Auto-login if secret exists
        if (adminSecret) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            loadBookings();
        }

        function login() {
            const secret = document.getElementById('adminSecret').value.trim();
            if (!secret) return;
            
            // Verify by making a test request to your API
            fetch(`${API_URL}?secret=${secret}&limit=1`)
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        adminSecret = secret;
                        localStorage.setItem('tilly_admin_secret', secret);
                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('dashboard').classList.add('active');
                        loadBookings();
                    } else {
                        document.getElementById('loginError').style.display = 'block';
                    }
                })
                .catch(() => {
                    document.getElementById('loginError').style.display = 'block';
                });
        }

        async function loadBookings() {
            const list = document.getElementById('bookingsList');
            list.innerHTML = '<div class="loading">Loading bookings...</div>';
            
            try {
                const res = await fetch(`${API_URL}?secret=${adminSecret}`);
                const data = await res.json();
                
                if (!data.success) throw new Error(data.error || "Failed to load");
                
                allBookings = data.bookings;
                renderBookings();
                updateStats();
            } catch (err) {
                list.innerHTML = `<div class="empty-state">Error loading bookings: ${err.message}</div>`;
            }
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = allBookings.length;
            document.getElementById('statPending').textContent = allBookings.filter(b => b.status === 'PENDING').length;
            document.getElementById('statConfirmed').textContent = allBookings.filter(b => b.status === 'CONFIRMED').length;
            const revenue = allBookings
                .filter(b => b.status === 'CONFIRMED' || b.status === 'COMPLETED')
                .reduce((sum, b) => sum + (parseInt(b.price) || 0), 0);
            document.getElementById('statRevenue').textContent = revenue;
        }

        function filterBookings(status) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderBookings();
        }

        function renderBookings() {
            const list = document.getElementById('bookingsList');
            const filtered = currentFilter === 'all' 
                ? allBookings 
                : allBookings.filter(b => b.status === currentFilter);
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">No bookings found</div>';
                return;
            }
            
            list.innerHTML = filtered.map(booking => `
                <div class="booking-card">
                    <div class="booking-header">
                        <div class="booking-ref">${booking.ref}</div>
                        <div class="status-badge status-${(booking.status || 'pending').toLowerCase()}">${booking.status}</div>
                    </div>
                    <div class="booking-details">
                        <div class="detail"><div class="detail-label">Client</div><div class="detail-value">${booking.name}</div></div>
                        <div class="detail"><div class="detail-label">Phone</div><div class="detail-value">${booking.phone}</div></div>
                        <div class="detail"><div class="detail-label">Location</div><div class="detail-value">${booking.location}${booking.building ? ' — ' + booking.building : ''}</div></div>
                        <div class="detail"><div class="detail-label">Size</div><div class="detail-value">${booking.size} m²</div></div>
                        <div class="detail"><div class="detail-label">Date & Time</div><div class="detail-value">${booking.date} | ${booking.timeLabel}</div></div>
                        <div class="detail"><div class="detail-label">Price</div><div class="detail-value">${booking.price} JOD</div></div>
                        <div class="detail"><div class="detail-label">Frequency</div><div class="detail-value">${booking.frequency}</div></div>
                        <div class="detail"><div class="detail-label">Extras</div><div class="detail-value">${booking.extras || 'None'}</div></div>
                    </div>
                    ${booking.notes ? `<div style="font-size: 0.85rem; color: var(--gray-400); margin-bottom: 16px; padding: 12px; background: var(--gray-100); border-radius: 8px;"><strong>Notes:</strong> ${booking.notes}</div>` : ''}
                    <div class="booking-actions">
                        ${booking.status === 'PENDING' ? `
                            <button class="action-btn btn-confirm" onclick="confirmBooking('${booking.ref}')">✅ Confirm Booking</button>
                            <button class="action-btn btn-cancel" onclick="cancelBooking('${booking.ref}')">❌ Cancel</button>
                        ` : ''}
                        <a href="https://wa.me/${booking.phone}" target="_blank" class="action-btn btn-whatsapp" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">💬 WhatsApp Client</a>
                    </div>
                </div>
            `).join('');
        }

        async function confirmBooking(ref) {
            const specialist = prompt('Assign specialist (Omar, Khaled, Hassan, Yousef):') || 'Your Tilly Specialist';
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ ref: ref, status: 'CONFIRMED', specialist: specialist, adminSecret: adminSecret })
                });
                
                const data = await res.json();
                if (data.success) {
                    alert(`✅ Booking ${ref} confirmed! Client notified via WhatsApp.`);
                    loadBookings();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Error confirming: ' + err.message);
            }
        }

        async function cancelBooking(ref) {
            if (!confirm(`Cancel booking ${ref}?`)) return;
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ ref: ref, status: 'CANCELLED', adminSecret: adminSecret })
                });
                
                const data = await res.json();
                if (data.success) {
                    loadBookings();
                } else {
                    alert('Error cancelling: ' + data.error);
                }
            } catch (err) {
                alert('Error cancelling: ' + err.message);
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(() => {
            if (document.getElementById('dashboard').classList.contains('active')) {
                loadBookings();
            }
        }, 30000);
    </script>
</body>
</html>
